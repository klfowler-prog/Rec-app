services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nextup
    ports:
      - "5433:5432"
    volumes:
      - nextup_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nextup"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/nextup
    ports:
      - "8000:8080"
    volumes:
      - ./app:/app/app
      - ./static:/app/static
    depends_on:
      db:
        condition: service_healthy

volumes:
  nextup_pgdata:
