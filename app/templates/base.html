<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NextUp{% endblock %} — NextUp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        bg: { light: '#FAF9F6', dark: '#1A1D23' },
                        surface: { light: '#FFFFFF', dark: '#252830' },
                        sage: { DEFAULT: '#8B9E6B', light: '#A8B88A', dark: '#6E8350' },
                        coral: { DEFAULT: '#E8734A', light: '#F09A7A', dark: '#C55A34' },
                        navy: { DEFAULT: '#2B3A4E', light: '#3D5068', dark: '#1E2A3A' },
                        cream: { DEFAULT: '#F5F0E8', dark: '#E8DFD0' },
                        gold: { DEFAULT: '#B8A97E' },
                        txt: { DEFAULT: '#2B3A4E', muted: '#7A8494', light: '#E5E5E3' },
                        border: { light: '#E8E4DC', dark: '#353840' },
                    },
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        body { font-size: 16px; line-height: 1.65; }
        .transition-base { transition: all 200ms ease; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.08); }
        .dark .card-hover:hover { box-shadow: 0 8px 25px rgba(0,0,0,0.3); }
        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #C0C0C0; border-radius: 3px; }
        .dark ::-webkit-scrollbar-thumb { background: #555; }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="bg-bg-light dark:bg-bg-dark text-txt dark:text-txt-light min-h-screen">
    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <nav class="w-60 bg-surface-light dark:bg-surface-dark border-r border-border-light dark:border-border-dark flex flex-col fixed h-full z-10">
            <div class="p-4 border-b border-border-light dark:border-border-dark bg-white dark:bg-surface-dark">
                <a href="/" class="block">
                    <img src="/static/img/a_vector_style_digital_vector_logo_for_nextup_fe.png" alt="NextUp" class="w-40 mx-auto">
                </a>
            </div>
            <div class="flex-1 py-4 px-3 space-y-1">
                <a href="/" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-base hover:bg-sage/10 {% if request.url.path == '/' %}bg-sage/10 text-sage-dark dark:text-sage-light font-medium{% else %}text-txt-muted{% endif %}">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                    Home
                </a>
                <a href="/search" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-base hover:bg-sage/10 {% if request.url.path == '/search' %}bg-sage/10 text-sage-dark dark:text-sage-light font-medium{% else %}text-txt-muted{% endif %}">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    Search
                </a>
                <a href="/profile" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-base hover:bg-sage/10 {% if request.url.path == '/profile' %}bg-sage/10 text-sage-dark dark:text-sage-light font-medium{% else %}text-txt-muted{% endif %}">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
                    My Profile
                </a>
                <a href="/recommend" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-base hover:bg-sage/10 {% if request.url.path == '/recommend' %}bg-sage/10 text-sage-dark dark:text-sage-light font-medium{% else %}text-txt-muted{% endif %}">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
                    Get Recs
                </a>
                <a href="/bulk-add" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-base hover:bg-sage/10 {% if request.url.path == '/bulk-add' %}bg-sage/10 text-sage-dark dark:text-sage-light font-medium{% else %}text-txt-muted{% endif %}">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 13h6m-3-3v6m5 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                    Bulk Add
                </a>
                <a href="/import/goodreads" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-base hover:bg-sage/10 {% if request.url.path == '/import/goodreads' %}bg-sage/10 text-sage-dark dark:text-sage-light font-medium{% else %}text-txt-muted{% endif %}">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
                    Import
                </a>
            </div>
            <div class="p-4 border-t border-border-light dark:border-border-dark space-y-2">
                {% if user is defined and user %}
                <div class="flex items-center gap-2.5 px-3 py-2">
                    {% if user.picture %}
                    <img src="{{ user.picture }}" alt="" class="w-7 h-7 rounded-full">
                    {% else %}
                    <div class="w-7 h-7 rounded-full bg-sage/20 flex items-center justify-center text-xs font-bold text-sage">{{ user.name[0] }}</div>
                    {% endif %}
                    <div class="flex-1 min-w-0">
                        <p class="text-xs font-medium truncate">{{ user.name }}</p>
                    </div>
                    <a href="/auth/logout" class="text-txt-muted hover:text-coral transition-base" title="Sign out">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                    </a>
                </div>
                {% endif %}
                <button id="theme-toggle" class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm text-txt-muted hover:bg-sage/10 transition-base w-full">
                    <svg id="theme-icon-light" class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                    <svg id="theme-icon-dark" class="w-5 h-5 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                    <span class="dark:hidden">Dark mode</span>
                    <span class="hidden dark:inline">Light mode</span>
                </button>
            </div>
        </nav>

        <!-- Main content -->
        <main class="flex-1 ml-60">
            <div class="max-w-5xl mx-auto px-8 py-8">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <script>
        // Theme toggle
        const html = document.documentElement;
        const toggle = document.getElementById('theme-toggle');
        if (localStorage.getItem('theme') === 'dark') html.classList.replace('light', 'dark');
        toggle.addEventListener('click', () => {
            html.classList.toggle('dark');
            html.classList.toggle('light');
            localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
