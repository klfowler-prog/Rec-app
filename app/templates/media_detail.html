{% extends "base.html" %}
{% block title %}Media Detail{% endblock %}

{% block content %}
<div id="detail-loading" class="text-center py-16">
    <div class="inline-block w-6 h-6 border-2 border-sage/30 border-t-sage rounded-full animate-spin"></div>
    <p class="text-sm text-txt-muted mt-3">Loading details...</p>
</div>

<div id="detail-content" class="hidden">
    <div class="flex flex-col md:flex-row gap-6 md:gap-8">
        <!-- Poster / Cover -->
        <div class="w-48 md:w-64 flex-shrink-0 mx-auto md:mx-0">
            <img id="detail-image" src="" alt="" class="w-full rounded-lg shadow-md">
            <div id="detail-placeholder" class="hidden w-full aspect-[2/3] bg-sage/10 rounded-lg flex items-center justify-center">
                <span class="text-sage text-4xl" id="detail-initial"></span>
            </div>
        </div>

        <!-- Info -->
        <div class="flex-1 space-y-4">
            <div>
                <div class="flex items-center gap-3 mb-2">
                    <span id="detail-type-badge" class="px-2.5 py-0.5 bg-sage/10 text-sage text-xs font-medium rounded-full capitalize"></span>
                    <span id="detail-year" class="text-sm text-txt-muted"></span>
                </div>
                <h2 id="detail-title" class="text-2xl font-semibold"></h2>
                <p id="detail-creator" class="text-sm text-txt-muted mt-1"></p>
            </div>

            <div id="detail-genres" class="flex gap-2 flex-wrap"></div>

            <p id="detail-description" class="text-sm leading-relaxed text-txt dark:text-txt-light/80"></p>

            <!-- Watch providers -->
            <div id="watch-providers-section" class="hidden">
                <h3 class="text-sm font-medium mb-2 text-txt-muted">Where to watch</h3>
                <div id="watch-providers" class="flex gap-3 flex-wrap"></div>
            </div>

            <!-- Actions -->
            <div class="flex gap-3 pt-2">
                <button id="add-to-profile-btn" class="px-5 py-2.5 bg-sage text-white rounded-lg text-sm font-medium transition-base hover:bg-sage-dark flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/></svg>
                    Add to profile
                </button>
                <span id="already-in-profile" class="hidden px-5 py-2.5 bg-sage/10 text-sage rounded-lg text-sm font-medium flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                    In your profile
                </span>
                <a id="detail-external-link" href="" target="_blank" class="hidden px-5 py-2.5 border border-border-light dark:border-border-dark rounded-lg text-sm text-txt-muted hover:text-txt transition-base flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
                    View on source
                </a>
            </div>
        </div>
    </div>
</div>

<!-- Add to profile modal -->
<div id="add-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/40">
    <div class="bg-surface-light dark:bg-surface-dark rounded-xl p-6 w-full max-w-md shadow-xl border border-border-light dark:border-border-dark">
        <h3 class="text-lg font-medium mb-4">Add to profile</h3>
        <form id="add-form" class="space-y-4">
            <div>
                <label class="block text-sm text-txt-muted mb-1">Status</label>
                <select id="add-status" class="w-full px-3 py-2 bg-bg-light dark:bg-bg-dark border border-border-light dark:border-border-dark rounded-lg text-sm">
                    <option value="consumed">I've consumed this</option>
                    <option value="consuming">Currently enjoying</option>
                    <option value="want_to_consume">Want to consume</option>
                </select>
            </div>
            <div>
                <label class="block text-sm text-txt-muted mb-1">Rating (1-10, optional)</label>
                <input type="number" id="add-rating" min="1" max="10" step="0.5" class="w-full px-3 py-2 bg-bg-light dark:bg-bg-dark border border-border-light dark:border-border-dark rounded-lg text-sm">
            </div>
            <div>
                <label class="block text-sm text-txt-muted mb-1">Notes (optional)</label>
                <textarea id="add-notes" rows="2" class="w-full px-3 py-2 bg-bg-light dark:bg-bg-dark border border-border-light dark:border-border-dark rounded-lg text-sm resize-none"></textarea>
            </div>
            <div class="flex gap-3 justify-end pt-2">
                <button type="button" id="add-cancel" class="px-4 py-2 text-sm text-txt-muted hover:text-txt transition-base">Cancel</button>
                <button type="submit" class="px-4 py-2 bg-sage text-white rounded-lg text-sm font-medium transition-base hover:bg-sage-dark">Add</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const MEDIA_TYPE = "{{ media_type }}";
    const EXTERNAL_ID = "{{ external_id }}";
    const SOURCE = new URLSearchParams(window.location.search).get('source') || '';
</script>
<script src="/static/js/media_detail.js"></script>
{% endblock %}
