name: NextUpTV
options:
  bundleIdPrefix: com.nextup
  deploymentTarget:
    tvOS: "17.0"
  xcodeVersion: "16.0"

targets:
  NextUpTV:
    type: application
    platform: tvOS
    sources:
      - path: App
      - path: Auth
      - path: Networking
      - path: Screens
      - path: Components
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nextup.tv
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_FILE: Resources/Info.plist
        DEVELOPMENT_TEAM: ""
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: false
    resources:
      - path: Resources/Assets.xcassets
